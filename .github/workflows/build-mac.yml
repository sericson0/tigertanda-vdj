name: Build macOS

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: |
          cd build
          zip -r TigerTanda-macOS.zip TigerTanda.bundle metadata.csv

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TigerTanda-macOS
          path: build/TigerTanda-macOS.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/TigerTanda-macOS.zip
